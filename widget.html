<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana — SmileCare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
html,body{overflow:hidden;margin:0;padding:0;box-sizing:border-box;}
*,*::before,*::after{box-sizing:border-box;}
:root{
  --g:#1a6b4a;--gl:#f0f7f4;--gm:#e0f0e9;--gd:#134f37;
  --tx:#1a1a1a;--tm:#6b7280;--th:#9ca3af;
  --bd:#e5e7eb;--bg:#fff;--sf:#f9fafb;--s2:#f3f4f6;
  --r:12px;--rs:8px;
}
body{font-family:'Inter',sans-serif;background:#fff;display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.hdr{padding:14px 16px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-av{width:38px;height:38px;border-radius:50%;background:var(--gl);border:2px solid var(--gm);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--g);flex-shrink:0;position:relative;}
.hdr-dot{position:absolute;bottom:1px;right:1px;width:8px;height:8px;background:#22c55e;border:2px solid #fff;border-radius:50%;}
.hdr-info{flex:1;}
.hdr-name{font-size:13.5px;font-weight:600;color:var(--tx);}
.hdr-sub{font-size:11px;color:var(--tm);margin-top:1px;display:flex;align-items:center;gap:4px;}
.hdr-sub::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#22c55e;}
.hdr-by{font-size:10px;color:var(--th);text-align:right;line-height:1.4;}
.hdr-by a{color:#2563eb;text-decoration:none;font-weight:600;}
.hdr-by a:hover{text-decoration:underline;}

/* LANG PICKER */
.lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;background:#fff;}
.lang-logo{width:52px;height:52px;border-radius:50%;background:var(--gl);border:2px solid var(--gm);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:var(--g);}
.lang-title{font-size:15px;font-weight:600;color:var(--tx);text-align:center;line-height:1.5;}
.lang-sub{font-size:13px;color:var(--tm);text-align:center;line-height:1.5;}
.lang-btns{display:flex;gap:10px;margin-top:4px;}
.lang-btn{padding:10px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--g);font-family:'Inter',sans-serif;transition:all 0.15s;}
.lang-btn.ru{background:var(--g);color:#fff;}
.lang-btn.ru:hover{background:var(--gd);}
.lang-btn.ro{background:#fff;color:var(--g);}
.lang-btn.ro:hover{background:var(--gl);}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}

.mrow{display:flex;gap:7px;max-width:88%;animation:mIn 0.2s ease;}
.mrow.bot{align-self:flex-start;}
.mrow.usr{align-self:flex-end;flex-direction:row-reverse;}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.mav{width:24px;height:24px;border-radius:50%;background:var(--gl);color:var(--g);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:auto;}

.mcol{display:flex;flex-direction:column;gap:2px;}

.mbbl{padding:8px 12px;font-size:13px;line-height:1.6;word-break:break-word;}
.bot .mbbl{background:var(--sf);color:var(--tx);border-radius:3px 12px 12px 12px;border:1px solid var(--bd);}
.usr .mbbl{background:var(--g);color:#fff;border-radius:12px 3px 12px 12px;}

/* Markdown in bot messages */
.mbbl strong{font-weight:600;}
.mbbl em{font-style:italic;}
.mbbl ul{margin:4px 0 4px 16px;}
.mbbl li{margin:2px 0;}

.mtime{font-size:10px;color:var(--th);padding:0 3px;}
.usr .mtime{text-align:right;}

/* TYPING */
.typing-bbl{background:var(--sf);border:1px solid var(--bd);border-radius:3px 12px 12px 12px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--th);animation:tb 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}
.tdot:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}

/* CONFIRM CARD */
.ccard{background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden;width:220px;}
.ccard-hdr{background:var(--gl);padding:7px 12px;font-size:10px;font-weight:700;color:var(--g);letter-spacing:.4px;text-transform:uppercase;}
.ccard-body{padding:9px 12px;}
.crow{display:flex;justify-content:space-between;gap:6px;padding:3px 0;font-size:11.5px;border-bottom:1px solid var(--s2);}
.crow:last-child{border:none;}
.ck{color:var(--tm);}
.cv{color:var(--tx);font-weight:500;text-align:right;}
.cbtns{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--bd);}
.cbtn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border:none;}
.cbtn.yes{background:var(--g);color:#fff;}
.cbtn.yes:hover{background:var(--gd);}
.cbtn.no{background:transparent;color:var(--tm);border:1px solid var(--bd);}
.cbtn.no:hover{background:var(--sf);}

/* QUICK REPLIES */
.qr{display:flex;flex-wrap:wrap;gap:5px;padding:3px 14px 8px;}
.qchip{font-size:11.5px;padding:5px 11px;border:1px solid rgba(26,107,74,.18);border-radius:18px;background:var(--gl);color:var(--g);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;font-weight:500;}
.qchip:hover{background:var(--gm);}

/* INPUT */
.inp-area{padding:9px 12px;border-top:1px solid var(--bd);display:flex;gap:7px;align-items:center;background:#fff;flex-shrink:0;}
.inp{flex:1;border:1px solid var(--bd);border-radius:20px;padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;background:var(--sf);color:var(--tx);outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--g);background:#fff;}
.inp::placeholder{color:var(--th);}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--g);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.send-btn:hover{background:var(--gd);}
.send-btn svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>

// ── SUPABASE ──
const SB_URL = 'https://jkehyvlmdqbjajfoedie.supabase.co';
const SB_KEY = 'sb_publishable_T9GXe53o17dh3LxZj5RGcQ_1fOZ_Zzn';
const sb = supabase.createClient(SB_URL, SB_KEY);
let convStatus = 'ai';
let sbChannel = null;

function sbCreateConv() {
  convReady = (async () => {
    try {
      const { data: existing } = await sb.from('conversations').select('id,chat_mode,status').eq('id', sessionId).maybeSingle();
      if (!existing) {

let convReady = null; // promise that resolves once conversation exists
async function sbSaveMsg(role, text) {

async function sbSaveBooking(b) {

// ── POLLING FALLBACK: подтягиваем админские сообщения и смену режима (на случай если realtime молчит) ──
let lastSeenMsgId = 0;
let widgetPollTimer = null;
function startWidgetPolling() {
  if (widgetPollTimer) clearInterval(widgetPollTimer);
  widgetPollTimer = setInterval(async () => {
    try {
      if (convReady) await convReady;
      // 1. Новые админские сообщения
      const { data: msgs } = await sb.from('messages')
        .select('id,role,text')
        .eq('conversation_id', sessionId)
        .eq('role', 'admin')
        .order('id', { ascending: true });
      (msgs || []).forEach(m => {
        if (m.id > lastSeenMsgId) {
          lastSeenMsgId = m.id;
          // не дублируем если realtime уже показал — помечаем по id
          if (!document.querySelector('[data-mid="' + m.id + '"]')) {
            removeTyping();
            const el = addMsg('👨‍⚕️ **Administrator:** ' + m.text, 'bot');
            if (el && el.setAttribute) el.setAttribute('data-mid', m.id);
            history.push({ role: 'assistant', content: '[Administrator]: ' + m.text });
          }
        }
      });
      // 2. Смена режима ai/human
      const { data: conv } = await sb.from('conversations').select('chat_mode').eq('id', sessionId).maybeSingle();
      if (conv && conv.chat_mode && conv.chat_mode !== convStatus) {
        const st = conv.chat_mode;
        convStatus = st;
        if (st === 'human') {
          addMsg(lang === 'en' ? '_An administrator has joined the conversation._' : '_Un administrator s-a alăturat conversației._', 'bot');
        } else if (st === 'ai') {
          addMsg(lang === 'en' ? '_Diana (AI) is back with you._' : '_Diana (AI) a revenit la conversație._', 'bot');
        }
      }
    } catch(e) { /* silent */ }
  }, 2000);
}

function sbSubscribe() {
  if (sbChannel) { try { sb.removeChannel(sbChannel); } catch(e){} }
  sbChannel = sb.channel('conv-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages',
        filter: 'conversation_id=eq.' + sessionId }, payload => {
      const m = payload.new;
      if (m.role === 'admin') {
        if (m.id && m.id <= lastSeenMsgId) return; // уже показано polling-ом
        if (m.id) lastSeenMsgId = m.id;
        removeTyping();
        const el = addMsg('👨‍⚕️ **Administrator:** ' + m.text, 'bot');
        if (el && el.setAttribute && m.id) el.setAttribute('data-mid', m.id);
        history.push({ role: 'assistant', content: '[Administrator]: ' + m.text });
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'conversations',
        filter: 'id=eq.' + sessionId }, payload => {
      const st = payload.new.chat_mode;
      if (st && st !== convStatus) {
        convStatus = st;
        if (st === 'human') {
          addMsg(lang === 'en'
            ? '_An administrator has joined the conversation._'
            : '_Un administrator s-a alăturat conversației._', 'bot');
        } else if (st === 'ai') {
          addMsg(lang === 'en'
            ? '_Diana (AI) is back with you._'
            : '_Diana (AI) a revenit la conversație._', 'bot');
        }
      }
    })
    .subscribe();
}

// ── Markdown renderer ──
function renderMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*\*/g,'')        // remove empty ****
    .replace(/\*\*\s*\*\*/g,'')    // remove ** ** with only spaces
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\*\*/g,'')            // remove any leftover **
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, s => '<ul>'+s+'</ul>')
    .replace(/\n/g,'<br>');
}

// ── now ──
function now() {
  return new Date().toLocaleTimeString('ro',{hour:'2-digit',minute:'2-digit'});
}

// ── Add message ──
function addMsg(text, role, extra) {
  const row  = document.createElement('div');
  row.className = `mrow ${role}`;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'mav'; av.textContent = 'D';
    row.appendChild(av);
  }

  const col = document.createElement('div');
  col.className = 'mcol';

  if (extra && extra.type === 'confirm') {
    const bbl = document.createElement('div');
    bbl.className = 'mbbl bot'; bbl.style.cssText='padding:0;background:transparent;border:none;';
    const tr = T[lang];
    bbl.innerHTML = `<div class="ccard">
      <div class="ccard-hdr">${tr.confirmHdr}</div>
      <div class="ccard-body">
        <div class="crow"><span class="ck">${tr.lbl.s}</span><span class="cv">${extra.d.service}</span></div>
        <div class="crow"><span class="ck">${tr.lbl.t}</span><span class="cv">${extra.d.time}</span></div>
        <div class="crow"><span class="ck">${tr.lbl.n}</span><span class="cv">${extra.d.name}</span></div>
        <div class="crow"><span class="ck">${tr.lbl.p}</span><span class="cv">${extra.d.phone}</span></div>
      </div>
      <div class="cbtns">
        <button class="cbtn yes" onclick="confirmBooking(true)">${tr.yes}</button>
        <button class="cbtn no"  onclick="confirmBooking(false)">${tr.no}</button>
      </div>
    </div>`;
    col.appendChild(bbl);
  } else {
    const bbl = document.createElement('div');
    bbl.className = 'mbbl';
    if (role === 'bot') {
      bbl.innerHTML = renderMd(text);
    } else {
      bbl.textContent = text;
    }
    col.appendChild(bbl);
  }

  const t = document.createElement('div');
  t.className = 'mtime'; t.textContent = now();
  col.appendChild(t);

  row.appendChild(col);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return row;
  convMessages.push({ role, text, time: now() });
  // Save dialog even without booking
  try {
    const dialogs = JSON.parse(localStorage.getItem('smilecare_dialogs') || '[]');
    const idx = dialogs.findIndex(d => d.sessionId === sessionId);
    const entry = { sessionId, lang, channel: 'widget', updatedAt: new Date().toISOString(), conversation: [...convMessages] };
    if (idx >= 0) dialogs[idx] = entry; else dialogs.unshift(entry);
    // Keep only last 50 dialogs
    localStorage.setItem('smilecare_dialogs', JSON.stringify(dialogs.slice(0,50)));
  } catch(e) {}
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'mrow bot'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'mav'; av.textContent = 'D';
  row.appendChild(av);
  const b = document.createElement('div');
  b.className = 'typing-bbl';
  b.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  row.appendChild(b);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setQR(items) {
  qrEl.innerHTML = '';
  items.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'qchip'; btn.textContent = text;
    btn.onclick = () => send(text);
    qrEl.appendChild(btn);
  });
}

// ── Parse booking ──
function parseBooking(text) {
  // Match BOOKING_READY or PROGRAMARE_GATA with flexible content
  const m = text.match(/(?:BOOKING_READY|PROGRAMARE_GATA)[:\s]+([^|\n]+?)\s*\|\s*([^|\n]+?)\s*\|\s*([^|\n]+?)\s*\|\s*([^\n]+)/);
  if (!m) return null;
  // Clean up any extra text like "cu Dr. X" from time field
  const service = m[1].trim();
  let time = m[2].trim();
  const name = m[3].trim();
  const phone = m[4].trim().replace(/[^0-9+]/g, '').slice(0, 12) || m[4].trim();
  return { service, time, name, phone };
}

// ── Save booking to localStorage ──
function saveBooking(booking) {
  try {
    const stored = JSON.parse(localStorage.getItem('smilecare_bookings') || '[]');
    if (bookingId) {
      // Update existing booking
      const idx = stored.findIndex(b => b.id === bookingId);
      if (idx >= 0) {
        stored[idx] = { ...stored[idx], ...booking, conversation: [...convMessages] };
        localStorage.setItem('smilecare_bookings', JSON.stringify(stored));
        return stored[idx];
      }
    }
    // Create new
    const entry = {
      id: 'bk_' + Date.now(),
      sessionId,
      ...booking,
      status: 'new',
      channel: 'widget',
      lang,
      createdAt: new Date().toISOString(),
      conversation: [...convMessages]
    };
    bookingId = entry.id;
    stored.unshift(entry);
    localStorage.setItem('smilecare_bookings', JSON.stringify(stored));
    return entry;
  } catch(e) {}
}

// ── Update conversation in localStorage after each message ──
function updateStoredConversation() {
  if (!bookingId) return;
  try {
    const stored = JSON.parse(localStorage.getItem('smilecare_bookings') || '[]');
    const idx = stored.findIndex(b => b.id === bookingId);
    if (idx >= 0) {
      stored[idx].conversation = [...convMessages];
      localStorage.setItem('smilecare_bookings', JSON.stringify(stored));
    }
  } catch(e) {}
}

// ── Send message ──
async function send(text) {
  if (!text.trim()) return;
  // If starting a new booking session after completion
  const newBookingPhrases = ['Book someone else','Altă programare','book someone','altă programare'];
  if (newBookingPhrases.some(p => text.toLowerCase().includes(p.toLowerCase()))) {
    bookingId = null;
    sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    try { localStorage.setItem('mx_active_sess', sessionId); } catch(e){}
    convMessages = [];
    sbCreateConv();
  }
  qrEl.innerHTML = '';
  addMsg(text, 'usr');
  history.push({ role: 'user', content: text });
  inpEl.value = '';
  sbSaveMsg('usr', text);
  if (convStatus === 'human') return; // admin is handling — AI stays silent
  showTyping();

  try {
    const res  = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: T[lang].system,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || T[lang].errConn;
    removeTyping();

    const booking = parseBooking(reply);
    if (booking) {
      pendingBooking = booking;
      const clean = reply.replace(/(?:BOOKING_READY|PROGRAMARE_GATA):.*/s, '').trim();
      if (clean) addMsg(clean, 'bot');
      addMsg('', 'bot', { type: 'confirm', d: booking });
    } else {
      addMsg(reply, 'bot');
    }
    history.push({ role: 'assistant', content: reply });
    if (booking) {
      const cleanForDb = reply.replace(/(?:BOOKING_READY|PROGRAMARE_GATA):.*/s, '').trim();
      if (cleanForDb) sbSaveMsg('bot', cleanForDb); // save only the human-readable part, never the marker
    } else {
      sbSaveMsg('bot', reply);
    }

    if (history.length <= 2) setQR(T[lang].qr);

  } catch(e) {
    removeTyping();
    addMsg(T[lang].errConn, 'bot');
  }
}

window.confirmBooking = function(yes) {
  const tr = T[lang];
  if (yes && pendingBooking) {
    sbSaveBooking(pendingBooking); // Supabase primary
    // saveBooking(pendingBooking); // localStorage disabled — Supabase is source of truth
    // Keep the same conversation — booking is now attached to it
    const msg = lang === 'en'
      ? `Great, **${pendingBooking.name}**! Your appointment is confirmed.\n\nSee you at SmileCare. SMS will arrive at **${pendingBooking.phone}**. 🦷`
      : `Excelent, **${pendingBooking.name}**! Programarea este confirmată.\n\nVă așteptăm la SmileCare. SMS pe **${pendingBooking.phone}**. 🦷`;
    addMsg(msg, 'bot');
    history.push({ role: 'assistant', content: msg });
    sbSaveMsg('bot', msg);
    setQR(tr.qr2);
  } else {
    const msg = lang === 'en' ? 'Of course! What would you like to change?' : 'Desigur! Ce doriți să modificați?';
    addMsg(msg, 'bot');
    history.push({ role: 'assistant', content: msg });
  }
  pendingBooking = null;
};

inpEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); send(inpEl.value); } });
document.getElementById('send-btn').onclick = () => send(inpEl.value);
